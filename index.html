<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Wilson</title>
</head>

<body>
    <main>
        <section class="header">
            <div class="container grid">
                <div class="column">
                    <div class="introduction">
                        <h1 class="title">Hi, I am<br><span class="name">Wilson Zhang</span></h1>
                        <p class="text">
                            I am a software developer specializing in building
                            modern applications, websites and other programs.
                        </p>
                    </div>
                </div>
                <div class="column">
                    <div class="all projects">
                        <div class="project">
                            <a href="https://ambitious-bay-07cda210f.5.azurestaticapps.net/"><img
                                    src="architecture_pic.jpg" alt="project1"></a>
                        </div>
                        <div class="project">
                            <a href="https://delightful-flower-02ae9c80f.5.azurestaticapps.net/"><img
                                    src="mart65_pic.jpg" alt="project2"></a>
                        </div>

                    </div>
                </div>
            </div>

            <div class="direction-buttons">
                <button onclick="Back()" class="button back">
                    <img style="transform: rotate(-180deg);" src="next_arrow.svg" alt="back">
                </button>
                <button onclick="Next()" class="button">
                    <img src="next_arrow.svg" alt="next">
                </button>
            </div>

        </section>

    </main>
    <script>
        function Back() {
            window.scrollBy({ left: -200, behavior: "smooth" });
        }
        function Next() {
            window.scrollBy({ left: 200, behavior: "smooth" });
        }
    </script>
</body>

</html>
